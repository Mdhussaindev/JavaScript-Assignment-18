<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth UI</title>

<!-- <!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #141e30, #243b55);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    padding: 15px; 
}

.container-box {
    background: #fff;
    border-radius: 15px;
    padding: 30px;
    width: 100%;
    max-width: 350px; 
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.container-box:hover {
    transform: scale(1.02);
}


h2 {
    text-align: center;
    margin-bottom: 20px;
    transition: 0.3s;
    cursor: pointer;
}

h2:hover {
    color: #00c6ff;
    transform: scale(1.1);
    letter-spacing: 2px;
}

.form-control {
    margin-bottom: 15px;
    border-radius: 10px;
    padding: 10px;
    font-size: 16px;
}


.btn-custom {
    width: 100%;
    border-radius: 10px;
    transition: 0.3s;
    padding: 10px;
    font-size: 16px;
}

.btn-custom:hover {
    background: #0d6efd;
    color: #fff;
    transform: translateY(-2px);
}

/* Toggle text */
.toggle-text {
    text-align: center;
    margin-top: 10px;
    cursor: pointer;
    color: #0d6efd;
    font-size: 14px;
}

.toggle-text:hover {
    text-decoration: underline;
}

.hidden {
    display: none;
}

/* 📱 Mobile (small screens) */
@media (max-width: 480px) {
    .container-box {
        padding: 20px;
        max-width: 100%;
    }

    h2 {
        font-size: 20px;
    }
}

/* 📲 Tablet */
@media (min-width: 481px) and (max-width: 768px) {
    .container-box {
        max-width: 400px;
    }
}

/* 💻 Laptop */
@media (min-width: 769px) and (max-width: 1200px) {
    .container-box {
        max-width: 420px;
    }
}

/* 🖥️ Large Screens */
@media (min-width: 1201px) {
    .container-box {
        max-width: 450px;
    }
}
</style>
</head>

<body>

<div class="container-box">

    <!-- Login Form -->
    <div id="loginForm">
        <h2>Login</h2>
        <input type="email" id="loginEmail" class="form-control" placeholder="Email">
        <input type="password" id="loginPassword" class="form-control" placeholder="Password">
        <button class="btn btn-primary btn-custom" onclick="login()">Login</button>
        <p class="toggle-text" onclick="showSignup()">Don't have an account? Signup</p>
    </div>

    <!-- Signup Form -->
    <div id="signupForm" class="hidden">
        <h2>Signup</h2>
        <input type="text" id="signupName" class="form-control" placeholder="Full Name">
        <input type="email" id="signupEmail" class="form-control" placeholder="Email">
        <input type="password" id="signupPassword" class="form-control" placeholder="Password">
        <button class="btn btn-success btn-custom" onclick="signup()">Signup</button>
        <p class="toggle-text" onclick="showLogin()">Already have an account? Login</p>
    </div>

</div>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
// Toggle Forms
function showSignup() {
    document.getElementById("loginForm").classList.add("hidden");
    document.getElementById("signupForm").classList.remove("hidden");
}

function showLogin() {
    document.getElementById("signupForm").classList.add("hidden");
    document.getElementById("loginForm").classList.remove("hidden");
}

function signup() {
    let name = signupName.value;
    let email = signupEmail.value;
    let password = signupPassword.value;

    let user = { name, email, password };

    // save user
    localStorage.setItem(email, JSON.stringify(user));

    // ✅ user ko login bhi kar do
    localStorage.setItem("currentUser", email);

    alert("Signup Successful 🔥");

    // ✅ direct dashboard / quiz pe bhejo
    window.location.href = "dashboard.html"; 
    // ya agar dashboard nahi hai:
    // window.location.href = "quiz.html";
}

// Login Function
function login() {
    let email = document.getElementById("loginEmail").value;
    let password = document.getElementById("loginPassword").value;

    let user = JSON.parse(localStorage.getItem(email));

    if (user && user.password === password) {
        alert("Login Successful!");
    } else {
        alert("Invalid Credentials!");

    }
    window.location.href = "dashboard.html";
}


</script>

</body>
</html>
