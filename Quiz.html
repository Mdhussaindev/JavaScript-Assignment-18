<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz App Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#141e30,#243b55);
  color: white;
  text-align: center;
}

/* Pages */
.page {
  display: none;
  padding: 40px;
}

.active {
  display: block;
}

/* Card */
.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  margin: auto;
  width: 320px;
  border-radius: 15px;
  box-shadow: 0 0 10px rgba(0,0,0,0.4);
}

/* Inputs */
input {
  width: 80%;
  padding: 10px;
  margin: 10px;
  border-radius: 8px;
  border: none;
}

/* Buttons */
button {
  padding: 10px 15px;
  margin: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #00c853;
  color: white;
}

button:hover {
  background: #00e676;
}

/* Quiz Options */
.option {
  display: block;
  width: 80%;
  margin: 10px auto;
}

/* Timer */
#timer {
  font-size: 20px;
  margin-bottom: 10px;
  color: yellow;
}
</style>
</head>

<body>

LOGIN
<div id="loginPage" class="page active">
  <h1>Login</h1>
  <div class="card">
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboardPage" class="page">
  <h1>Dashboard</h1>

  <div class="card">
    <h2>Welcome 🎉</h2>
    <p>Select Quiz to Start</p>
    <button onclick="startQuiz()">Start Quiz</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<!-- QUIZ -->
<div id="quizPage" class="page">
  <h1>Quiz</h1>

  <div class="card">
    <div id="timer">Time: 10</div>

    <h3 id="question">Question</h3>

    <button class="option" onclick="answer('A')" id="optA"></button>
    <button class="option" onclick="answer('B')" id="optB"></button>
    <button class="option" onclick="answer('C')" id="optC"></button>
    <button class="option" onclick="answer('D')" id="optD"></button>
  </div>
</div>

<script>

function show(page){
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
}

/* LOGIN */
function login(){
  let u = user.value;
  let p = pass.value;

  if(u && p){
    show("dashboardPage");
  } else {
    alert("Fill fields");
  }
}

/* LOGOUT */
function logout(){
  show("loginPage");
}

/* QUIZ DATA */
let questions = [
  {
    q:"HTML stands for?",
    options:["Hyper Text Markup Language","Home Tool","High Text","None"],
    answer:"A"
  },
  {
    q:"CSS is used for?",
    options:["Design","Logic","Database","Server"],
    answer:"A"
  }
];

let index = 0;
let score = 0;
let time = 10;
let timer;

/* START QUIZ */
function startQuiz(){
  show("quizPage");
  index = 0;
  score = 0;
  loadQ();
  startTimer();
}

/* LOAD QUESTION */
function loadQ(){
  let q = questions[index];

  document.getElementById("question").innerText = q.q;
  optA.innerText = "A: " + q.options[0];
  optB.innerText = "B: " + q.options[1];
  optC.innerText = "C: " + q.options[2];
  optD.innerText = "D: " + q.options[3];
}

/* TIMER */
function startTimer(){
  clearInterval(timer);
  time = 10;

  timer = setInterval(() => {
    document.getElementById("timer").innerText = "Time: " + time;
    time--;

    if(time < 0){
      nextQ();
    }
  },1000);
}

/* ANSWER */
function answer(opt){
  if(opt === questions[index].answer){
    score++;
  }
  nextQ();
}

/* NEXT */
function nextQ(){
  index++;

  if(index < questions.length){
    loadQ();
    startTimer();
  } else {
    clearInterval(timer);
    document.getElementById("quizPage").innerHTML =
    `<div class="card">
      <h2>Quiz Finished 🎉</h2>
      <h3>Score: ${score}/${questions.length}</h3>
      <button onclick="location.reload()">Restart</button>
    </div>`;
  }
}

</script>

</body>
</html>
